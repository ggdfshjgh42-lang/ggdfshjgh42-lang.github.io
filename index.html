<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="奥斯拖拉机斯基 - 博客与小游戏">
    <title>奥斯拖拉机斯基 | Fantastic Matrix</title>
    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-muted: #999;
            --accent: #2d2d2d;
            --border: #ebebeb;
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.75;
            overflow-x: hidden;
            padding-top: 72px;
        }

        /* ---- Nav ---- */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(250, 250, 250, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-logo {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.5px;
            color: var(--text);
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 28px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: var(--text);
        }

        /* ---- Layout ---- */
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 32px;
        }

        section {
            padding: 80px 0 40px;
        }

        /* ---- Section Titles ---- */
        .section-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 32px;
            line-height: 1.3;
        }

        /* ======== Blog ======== */
        .blog-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .blog-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
        }
        .blog-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            border-color: var(--text);
        }
        .blog-card-date {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .blog-card-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
            line-height: 1.4;
        }
        .blog-card-excerpt {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        .blog-card-tags {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .blog-tag {
            font-size: 12px;
            padding: 4px 12px;
            background: #f3f3f3;
            border-radius: 20px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Blog Post View */
        #blog-post {
            display: none;
        }
        #blog-post.active {
            display: block;
        }
        .post-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 24px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .post-back:hover {
            color: var(--text);
        }
        .post-title {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.3;
            margin-bottom: 16px;
        }
        .post-meta {
            font-size: 14px;
            color: var(--text-muted);
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 40px;
        }
        .post-body {
            font-size: 17px;
            line-height: 2;
            color: var(--text);
        }
        .post-body h3 {
            font-size: 22px;
            margin: 40px 0 16px;
            font-weight: 700;
        }
        .post-body p {
            margin-bottom: 20px;
            color: #333;
        }
        .post-body blockquote {
            border-left: 3px solid var(--border);
            padding-left: 20px;
            margin: 24px 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        .post-body img {
            max-width: 100%;
            border-radius: var(--radius);
            margin: 24px 0;
        }

        #blog-list.hidden {
            display: none;
        }

        /* ---- Footer ---- */
        footer {
            border-top: 1px solid var(--border);
            padding: 32px 0;
            text-align: center;
            margin-top: 40px;
        }
        footer p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ---- Responsive ---- */
        @media (max-width: 640px) {
            section { padding: 60px 0 30px; }
            .nav-links { gap: 16px; }
            .nav-links a { font-size: 13px; }
            .post-title { font-size: 28px; }
            .blog-card-title { font-size: 18px; }
            .blog-card { padding: 24px; }
            .section-title { font-size: 26px; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav id="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-logo">奥斯拖拉机斯基</a>
            <ul class="nav-links">
                <li><a href="/">博客</a></li>
                <li><a href="gomoku.html">小游戏</a></li>
            </ul>
        </div>
    </nav>

    <!-- Blog -->
    <section id="blog">
        <div class="container">
            <p class="section-label">博客</p>
            <h2 class="section-title">随便写写</h2>

            <!-- Blog List -->
            <div id="blog-list" class="blog-list"></div>

            <!-- Blog Post (hidden by default) -->
            <div id="blog-post">
                <a href="/" class="post-back" id="post-back-btn">&larr; 返回博客列表</a>
                <div class="post-header">
                    <h1 class="post-title" id="post-title"></h1>
                    <div class="post-meta">
                        <span id="post-date"></span>
                        <span>·</span>
                        <span id="post-tags-display"></span>
                    </div>
                </div>
                <div class="post-body" id="post-body"></div>
                <div style="margin-top: 48px; padding-top: 32px; border-top: 1px solid var(--border);">
                    <a href="/" class="post-back">&larr; 返回博客列表</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 fantasticmatrix.xyz — 奥斯拖拉机斯基</p>
        </div>
    </footer>

    <script>
        // ======== Blog Data ========
        const posts = [
            {
                id: 4,
                slug: 'nonsense-literature',
                title: '今天发点废话',
                date: '2026-07-08',
                excerpt: '废话之所以是废话，恰恰因为它不是别的话。',
                tags: ['废话文学', '日常'],
                body: `<p>今天想说点什么，但又不知道说什么。于是决定随便说点废话。</p>

<p>废话的意义也许就在于它没有意义。就像空气的意义就在于它看不见摸不着，但它确实存在。我们每天说的话里，有百分之九十都是废话——"吃了吗""好""嗯嗯""哈哈"——但如果没有这些废话，人和人之间大概就只剩沉默了。</p>

<blockquote>你仔细想想，你今天说了多少句废话？你仔细想想这句话本身，是不是也是一句废话？</blockquote>

<p>有人说废话浪费时间，但时间本来就是用来浪费的。你浪费的每一秒，都在证明你还活着。所以写废话的人并不是在浪费你的时间，而是在提醒你：时间不需要每一秒都用在刀刃上，因为刀刃也会钝。而废话，永远不会钝。</p>

<p>这篇文章写到这儿，我也不知道自己在说什么了。但没关系，废话文学的精髓就是：你以为是废话的时候，它确实是废话；你以为是真理的时候，它可能还是废话。</p>`
            },
            {
                id: 1,
                slug: 'why-we-read',
                title: '我们为什么要读书',
                date: '2026-07-05',
                excerpt: '读书不是为了记住什么，而是为了在某个不确定的瞬间，发现自己原来可以这样理解世界。',
                tags: ['读书', '随笔'],
                body: `<p>小时候被逼着读书，大了反而自己想读。这件事本身就很有意思。</p>

<p>我觉得读书最好的状态不是"我要读完这本书"，而是"这本书刚好在我手边"。没有压力、没有 deadline，翻开哪页算哪页。有时候一页能让人想一下午。</p>

<h3>读书不是输入，是对话</h3>

<p>很多人把读书当成一种"输入"——获取知识、积累素材。但我越来越觉得，读书更像一场对话。你在读的时候，其实是在和作者争论、共鸣、质疑。</p>

<blockquote>一本好书就像一面镜子，你读到的不只是作者的想法，更多的是你自己的投射。</blockquote>

<p>有时候读完一本书，记住的不是具体内容，而是一种感觉。那种"原来还可以这样想"的瞬间，就是阅读最珍贵的部分。</p>

<h3>读得慢一点</h3>

<p>我以前也有"一年读 50 本书"的野心，后来放弃了。不是因为读不完，而是觉得没必要。一本好书反复读三遍，比匆匆翻过三本新书要有意义得多。</p>

<p>现在我们被训练成快速消费信息的机器——刷短视频、刷微博、刷朋友圈。但有些东西天生就是慢的：一首好诗、一本好小说、一个需要琢磨的观点。</p>

<p>慢下来，反而读得更多了。</p>`
            },
            {
                id: 2,
                slug: 'camera-and-eye',
                title: '摄影教会我的那些事',
                date: '2026-06-28',
                excerpt: '按下快门的那一刻，你不是在记录世界，而是在选择看世界的方式。',
                tags: ['摄影', '生活'],
                body: `<p>我有个习惯：出门一定会带相机。不一定是专业的，有时候就是手机。</p>

<p>很多人问："天天拍有什么好拍的？"其实这个问题本身就是答案——正因为觉得没什么好拍的，才更要拍。摄影训练的不是技术，是眼睛。</p>

<h3>学会发现平凡中的不平凡</h3>

<p>自从开始拍照之后，走路的方式都变了。以前是低头赶路，现在是到处张望。你会发现楼梯转角的光影、路边老人脸上的皱纹、下雨后地上的倒影——这些东西一直都在，只是之前从没认真看过。</p>

<blockquote>摄影最神奇的地方在于：它让你对习以为常的东西重新感到好奇。</blockquote>

<p>这种好奇会蔓延到生活的其他方面。你开始注意季节变化的细节、注意到街上人们的表情、注意到一天中不同时刻的光线。世界变得更有层次了。</p>

<h3>接受不完美</h3>

<p>拍了 100 张照片，可能只有 1 张自己满意。但那 99 张不是浪费，它们教会你什么是好的。</p>

<p>这和很多事情一样——学写作、学编程、学任何东西。你不可能一开始就做出完美的作品，但每一次尝试都在缩小你和"好"之间的距离。</p>

<p>所以现在我拍照不再纠结于"拍得好不好"，而是"拍完开不开心"。心态变了，照片也跟着变了。</p>`
            },
            {
                id: 3,
                slug: 'build-first-website',
                title: '我建了一个自己的网站',
                date: '2026-07-08',
                excerpt: '拥有一块属于自己的互联网角落，这件事比想象中更有意义。',
                tags: ['技术', '生活'],
                body: `<p>终于有了自己的域名和网站——fantasticmatrix.xyz。</p>

<p>说实话，在这个社交媒体泛滥的时代，建一个个人网站听起来有点老派。谁还会去输入一个网址呢？但我还是做了。不是为了让别人看，是为了让自己有一块地方。</p>

<h3>为什么要有一个自己的网站？</h3>

<p>社交媒体很方便，但有一个根本问题：你的内容不属于你。平台可以随时改规则、改算法、甚至关掉。你在上面写的东西，本质上是在帮别人建内容。</p>

<p>而一个自己的网站不一样。你想放什么就放什么，想怎么设计就怎么设计。没有人给你限流，没有人插广告，没有人告诉你"这条内容可能不太合适"。</p>

<blockquote>拥有一个自己的网站，就像在数字世界里有一间属于自己的房间。</blockquote>

<h3>建站本身就是一个学习过程</h3>

<p>从写 HTML 到配置 DNS，从 GitHub Pages 到绑定域名，中间踩了不少坑。但也正是这些坑，让我理解了互联网最基础的运作方式——域名是怎么解析的、静态网站是怎么托管的、Git 是怎么协作的。</p>

<p>这些知识可能不会出现在考试里，但它们让我觉得，互联网不再是那个神秘的黑盒子了。</p>

<p>希望这个网站能一直更新下去。</p>`
            }
        ];

        // ======== Blog Rendering ========
        function showBlogList() {
            var list = document.getElementById('blog-list');
            var post = document.getElementById('blog-post');
            if (list) list.classList.remove('hidden');
            if (post) post.classList.remove('active');
            window.location.hash = '';
        }

        function showBlogPost(postId) {
            var post = posts.find(function(p) { return p.id === postId || p.slug === postId; });
            if (!post) { showBlogList(); return; }

            document.getElementById('blog-list').classList.add('hidden');
            document.getElementById('blog-post').classList.add('active');

            document.getElementById('post-title').textContent = post.title;
            document.getElementById('post-date').textContent = post.date;
            document.getElementById('post-tags-display').textContent = post.tags.join(' · ');
            document.getElementById('post-body').innerHTML = post.body;

            window.location.hash = 'post-' + post.slug;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderBlogList() {
            var container = document.getElementById('blog-list');
            if (!container) return;
            container.innerHTML = posts.map(function(post) {
                return '<div class="blog-card" onclick="showBlogPost(\'' + post.slug + '\')">' +
                    '<div class="blog-card-date">' + post.date + '</div>' +
                    '<h3 class="blog-card-title">' + post.title + '</h3>' +
                    '<p class="blog-card-excerpt">' + post.excerpt + '</p>' +
                    '<div class="blog-card-tags">' +
                        post.tags.map(function(t) { return '<span class="blog-tag">' + t + '</span>'; }).join('') +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function handleBlogRoute() {
            var hash = window.location.hash;
            if (hash.indexOf('#post-') === 0) {
                var slug = hash.replace('#post-', '');
                var post = posts.find(function(p) { return p.slug === slug; });
                if (post) showBlogPost(post.id);
            }
        }

        // Init when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            // Back button
            var backBtn = document.getElementById('post-back-btn');
            if (backBtn) {
                backBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    showBlogList();
                });
            }

            // Render blog
            renderBlogList();
            handleBlogRoute();
        });
    </script>
</body>
</html>
